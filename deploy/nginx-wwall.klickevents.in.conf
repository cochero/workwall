# Workwall — wwall.klickevents.in
# Copy to /etc/nginx/sites-available/wwall.klickevents.in and symlink into sites-enabled,
# then run: sudo nginx -t && sudo systemctl reload nginx
# HTTPS: sudo certbot --nginx -d wwall.klickevents.in (rewrites this file for 443 + redirect)

server {
    listen 80;
    server_name wwall.klickevents.in;

    client_max_body_size 60m;

    root /var/www/workwall/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
